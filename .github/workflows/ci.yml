name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend lint + tests
    runs-on: ubuntu-latest

    services:
      db:
        image: timescale/timescaledb:2.28.0-pg17
        env:
          POSTGRES_USER: robosense
          POSTGRES_PASSWORD: robosense
          POSTGRES_DB: robosense
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U robosense -d robosense"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://robosense:robosense@localhost:5432/robosense

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Run tests
        run: pytest -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (type-checks + compiles)
        run: npm run build

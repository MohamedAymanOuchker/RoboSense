; PlatformIO project for the RoboSense ESP32 firmware.
;
;   pio run                 # compile
;   pio run -t upload       # flash over USB
;   pio device monitor      # serial console (115200 baud)
;
; Prefer not to put secrets in the .ino? Uncomment the build_flags below and set
; them here (this file can be kept out of version control).

[platformio]
; Keep the single .ino in this folder (Arduino-IDE friendly) instead of src/.
src_dir = .

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    ; -DWIFI_SSID='"your-wifi-ssid"'
    ; -DWIFI_PASSWORD='"your-wifi-password"'
    ; -DROBOSENSE_HOST='"http://192.168.1.50:8000"'
    ; -DROBOSENSE_API_KEY='"rsk_your_device_api_key"'
    ; -DDEVICE_NAME='"esp32-rover"'
    ; -DPOST_INTERVAL_MS=5000

lib_deps =
    ; Only required if you enable USE_DHT22 in the firmware:
    ; adafruit/DHT sensor library @ ^1.4.6
    ; adafruit/Adafruit Unified Sensor @ ^1.1.14
